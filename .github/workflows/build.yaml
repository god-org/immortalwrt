name: Build

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 启用 tmate 远程调试
        required: false
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v6

      - name: 清理磁盘释放空间
        uses: BRAINSia/free-disk-space@v2
        with:
          docker-images: false

      - name: 开启 tmate 远程调试会话
        if: github.event_name == 'workflow_dispatch' && inputs.debug_enabled
        uses: mxschmitt/action-tmate@v3

      - name: 固件编译全流程
        shell: bash
        env:
          SCRIPT_FILE: .github/scripts/build_orchestrator.sh
          DEBIAN_FRONTEND: noninteractive
          DEPENDENCIES_FILE: n1/dependencies
          REPO_URL: https://github.com/immortalwrt/immortalwrt
          REPO_BRANCH: openwrt-24.10
          FILES_DIR: n1/files
          CONFIG_FILE: n1/.config
          DIY_SCRIPT: n1/diy.sh
        run: |
          set -euxo pipefail
          [[ ! -x "${SCRIPT_FILE}" ]] && chmod +x "${SCRIPT_FILE}"
          "./${SCRIPT_FILE}"

      - name: 上传 ImmortalWrt 编译文件
        if: env.compile_status == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: immortalwrt_${{ env.RELEASE_TAG }}
          path: immortalwrt/bin

      - name: 打包 ImmortalWrt 固件
        if: env.compile_status == 'success'
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMSR: immortalwrt/bin/targets/*/*/*rootfs.tar.gz
          KERNEL_VERSION_NAME: 6.12.y
          PACKAGE_SOC: diy
          GZIP_IMGS: .xz
          SCRIPT_DIY_PATH: n1/mk_s905d_n1.sh
          WHOAMI: ${{ github.repository_owner }}
          SW_FLOWOFFLOAD: 0
          SFE_FLOW: 0
          ENABLE_WIFI_K510: 0
          DISTRIB_DESCRIPTION: ImmortalWrt

      - name: 上传固件至 GitHub Release
        if: env.PACKAGED_STATUS == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.xz
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.RELEASE_TAG }}
          body: |
            ### 📦 固件信息
            - 💻 **机型**: 斐讯N1 ( Amlogic S905D )
            - 🌳 **源码**: [immortalwrt/immortalwrt](${{ env.REPO_URL }})
            - 🌿 **分支**: `${{ env.REPO_BRANCH }}`
            - 📅 **编译时间**: ${{ env.BUILD_TIME }}
            - 🌏 **默认地址**: `192.168.1.2`
            - 👤 **默认用户**: `root`
            - 🔒 **默认密码**: `password`
            ---
            ⚠️ **注意事项**: 首次使用建议全新刷写

      - name: 发送构建结果至 Telegram
        uses: appleboy/telegram-action@v1.0.1
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>🚀 ImmortalWrt 构建报告</b>

            ${{ job.status == 'success' && '✅ 成功' || '❌ 失败' }}

            <b>📦 项目信息</b>
            仓库：<code>${{ github.repository }}</code>
            分支：<code>${{ github.ref_name }}</code>
            编号：<code>${{ github.run_number }}</code>

            <b>👤 触发信息</b>
            账号：<code>${{ github.actor }}</code>
            触发：<code>${{ github.event_name }}</code>
            哈希：<code>${{ github.sha }}</code>

            <b>🔗 快速链接</b>
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">📋 查看完整日志</a>
            <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">💻 查看代码变更</a>
